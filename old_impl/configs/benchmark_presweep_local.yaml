# Tiny grid for pre-sweep gate (local CPU/GPU smoke).
sweep_id: bench_presweep_local_v1
model_name: gpt2
max_new_tokens: 6
device: auto
dtype: float16
seed: 42
warmup_runs: 0
num_trials: 1
verify_match: false
mt_bench_path: data/mt_bench_subset.json
max_prompts: 2
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
strict_labeled_grid: true
modes:
  - ar
  - spec_fp16
  - spec_quant_memonly
k_values: [1]
sparsity_budgets: [0.4]
quant_bits: [4]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: outputs/benchmarks/presweep_local.csv
raw_jsonl_path: outputs/benchmarks/raw/bench_presweep_local_v1.jsonl
processed_json: outputs/benchmarks/processed/bench_presweep_local_v1_rollup.json
summary_csv: outputs/benchmarks/presweep_local_summary.csv
config_bundle_json: outputs/benchmarks/bench_presweep_local_v1_config.json
resume: false
retry_failures: false
