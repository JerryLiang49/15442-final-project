# Modal smoke: small strict grid + Volume paths (crash-safe append).
# Output paths use *_schema_v2* so they do not collide with pre–Phase-15 CSVs on the Volume
# (schema v2 requires benchmark_label; old sweep_smoke_modal.csv is rejected by the runner).
sweep_id: bench_smoke_modal_v2
model_name: gpt2
max_new_tokens: 8
device: cuda
dtype: float16
seed: 42
warmup_runs: 0
num_trials: 1
verify_match: false
mt_bench_path: /repo/data/mt_bench_subset.json
max_prompts: 3
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
strict_labeled_grid: true
modes:
  - ar
  - spec_fp16
  - spec_quant_memonly
k_values: [1, 3]
sparsity_budgets: [0.4]
quant_bits: [4, 8]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: /results/sweep_smoke_modal_schema_v2.csv
raw_jsonl_path: /results/raw/bench_smoke_modal_v2.jsonl
processed_json: /results/processed/bench_smoke_modal_v2_rollup.json
summary_csv: /results/sweep_smoke_modal_schema_v2_summary.csv
config_bundle_json: /results/bench_smoke_modal_v2_config.json
resume: true
retry_failures: false
