# Full **strict-labeled** grid (Phase 15). Use on GPU; expect long runtime.
# For Modal, use `configs/benchmark_full_modal.yaml` so outputs land on the `/results` Volume.
sweep_id: bench_full_v2
model_name: gpt2
max_new_tokens: 32
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 3
verify_match: false
mt_bench_path: data/mt_bench_subset.json
max_prompts: null
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
  - long
strict_labeled_grid: true
# Joint sparse_quant scheduled before quant_only / sparse_only (see benchmark_full_modal.yaml).
modes:
  - autoregressive
  - speculative_fp16
  - sparse_quant
  - quant_only
  - sparse_only
k_values: [1, 3, 5, 7]
sparsity_budgets: [0.1, 0.2, 0.4, 1.0]
quant_bits: [4, 8, 16]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: outputs/benchmarks/sweep_full_v2.csv
raw_jsonl_path: outputs/benchmarks/raw/bench_full_v2.jsonl
processed_json: outputs/benchmarks/processed/bench_full_v2_rollup.json
summary_csv: outputs/benchmarks/sweep_full_v2_summary.csv
config_bundle_json: outputs/benchmarks/bench_full_v2_config.json
resume: true
retry_failures: false
