# Full strict-labeled grid on Modal: Volume under `/results`.
#
# **Mode order matters:** `sparse_quant` (joint: spec_sparse_quant_memonly) is the largest cell count
# per prompt under strict grid. It is scheduled **early** (right after AR + FP16 spec) so a
# time-limited run still captures joint sparse+INT-KV data. Modal `timeout` is 4h in `modal_sweep.py`.
#
# Outputs use v3 paths so you do not resume into an old incomplete CSV by mistake.
sweep_id: bench_full_modal_v3
model_name: gpt2
max_new_tokens: 32
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 3
verify_match: false
mt_bench_path: /repo/data/mt_bench_subset.json
max_prompts: null
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
  - long
strict_labeled_grid: true
# Joint mode early: autoregressive → FP16 spec → sparse+quant → quant-only → sparse-only
modes:
  - autoregressive
  - speculative_fp16
  - sparse_quant
  - quant_only
  - sparse_only
k_values: [1, 3, 5, 7]
sparsity_budgets: [0.1, 0.2, 0.4, 1.0]
quant_bits: [4, 8, 16]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: /results/sweep_full_modal_v3.csv
raw_jsonl_path: /results/raw/bench_full_modal_v3.jsonl
processed_json: /results/processed/bench_full_modal_v3_rollup.json
summary_csv: /results/sweep_full_modal_v3_summary.csv
config_bundle_json: /results/bench_full_modal_v3_config.json
resume: true
retry_failures: false
