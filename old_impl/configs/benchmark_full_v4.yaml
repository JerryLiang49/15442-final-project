# Local GPU: same reduced grid as `benchmark_full_modal_v4.yaml` (v4).
sweep_id: bench_full_v4
model_name: gpt2
max_new_tokens: 32
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 3
verify_match: false
mt_bench_path: data/mt_bench_subset.json
max_prompts: null
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
  - long
strict_labeled_grid: true
modes:
  - autoregressive
  - speculative_fp16
  - sparse_quant
  - quant_only
  - sparse_only
k_values: [1, 3, 7]
sparsity_budgets: [0.1, 0.4, 1.0]
quant_bits: [4, 8, 16]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: outputs/benchmarks/sweep_full_v4.csv
raw_jsonl_path: outputs/benchmarks/raw/bench_full_v4.jsonl
processed_json: outputs/benchmarks/processed/bench_full_v4_rollup.json
summary_csv: outputs/benchmarks/sweep_full_v4_summary.csv
config_bundle_json: outputs/benchmarks/bench_full_v4_config.json
resume: true
retry_failures: false
