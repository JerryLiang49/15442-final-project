# Full strict-labeled grid on Modal: persist CSV/JSONL under `/results` (Volume). Expect long runs.
# If the job hits the 1h @app.function timeout, increase `timeout` in `modal_sweep.py` or shrink the grid.
# Use *_schema_v2* paths if an older CSV without benchmark_label already exists on the Volume.
sweep_id: bench_full_modal_v2
model_name: gpt2
max_new_tokens: 32
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 3
verify_match: false
mt_bench_path: /repo/data/mt_bench_subset.json
max_prompts: null
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
  - long
strict_labeled_grid: true
modes:
  - autoregressive
  - speculative_fp16
  - quant_only
  - sparse_only
  - sparse_quant
k_values: [1, 3, 5, 7]
sparsity_budgets: [0.1, 0.2, 0.4, 1.0]
quant_bits: [4, 8, 16]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: /results/sweep_full_schema_v2.csv
raw_jsonl_path: /results/raw/bench_full_modal_v2.jsonl
processed_json: /results/processed/bench_full_modal_v2_rollup.json
summary_csv: /results/sweep_full_schema_v2_summary.csv
config_bundle_json: /results/bench_full_modal_v2_config.json
resume: true
retry_failures: false
