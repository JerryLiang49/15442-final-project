# Medium debugging sweep: more modes and buckets; still modest cost.
sweep_id: bench_medium_v1
model_name: gpt2
max_new_tokens: 16
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 2
verify_match: false
mt_bench_path: data/mt_bench_subset.json
max_prompts: 8
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
strict_labeled_grid: true
modes:
  - autoregressive
  - speculative_fp16
  - quant_only
  - sparse_only
  - sparse_quant
k_values: [1, 3, 5]
sparsity_budgets: [0.2, 0.4, 1.0]
quant_bits: [8, 16]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: outputs/benchmarks/sweep_medium.csv
raw_jsonl_path: outputs/benchmarks/raw/bench_medium_v1.jsonl
processed_json: outputs/benchmarks/processed/bench_medium_v1_rollup.json
summary_csv: outputs/benchmarks/sweep_medium_summary.csv
config_bundle_json: outputs/benchmarks/bench_medium_v1_config.json
resume: true
retry_failures: false
