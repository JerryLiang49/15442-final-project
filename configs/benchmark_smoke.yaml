# Tiny sweep: local debugging (GPT-2, few prompts, small grid).
sweep_id: bench_smoke_local_v1
model_name: gpt2
max_new_tokens: 8
device: auto
dtype: float16
seed: 42
warmup_runs: 0
num_trials: 1
verify_match: false
mt_bench_path: data/mt_bench_subset.json
max_prompts: 3
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
strict_labeled_grid: true
modes:
  - autoregressive
  - speculative_fp16
k_values: [1, 3]
sparsity_budgets: [0.4]
quant_bits: [8]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: outputs/benchmarks/sweep_smoke.csv
raw_jsonl_path: outputs/benchmarks/raw/bench_smoke_local_v1.jsonl
processed_json: outputs/benchmarks/processed/bench_smoke_local_v1_rollup.json
summary_csv: outputs/benchmarks/sweep_smoke_summary.csv
config_bundle_json: outputs/benchmarks/bench_smoke_local_v1_config.json
resume: true
retry_failures: false
