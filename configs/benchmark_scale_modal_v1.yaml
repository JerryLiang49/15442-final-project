# Scale sweep (v1): **larger model + longer prompts** than `benchmark_full_modal_v4.yaml`.
#
# Model: **gpt2-xl** (~1.5B) — public, no gating; same tokenizer family as `gpt2` for comparable tokenization.
# Prompts: `data/mt_bench_scale_prompts.json` = original 17 MT-Bench subset prompts + 8 curated long/medium
#   entries (see `scripts/build_mt_bench_scale_prompts.py`). Synthetic repetition is for **reproducible**
#   length — not web-scraped text.
#
# GPT-2 / gpt2-xl have **max context 1024** tokens. With ``max_new_tokens: [32, 64]``, keep
# **prompt_tokens + 64 ≤ 1024** (scale JSON is generated to fit). Use ``benchmark_scale_longctx_modal_v1.yaml``
# for a ~2k+ context model and the same grid.
#
# Buckets: short ≤256 | medium (256, 640] | long >640  (empirically populates medium + long with scale JSON)
#
# Grid: 65 cells × 25 prompts × 2 gen lengths × 2 trials = 6,500
#   (modes × K∈{1,3,5,7} × sparsity × quant; ``max_new_tokens``: 32 and 64).
#
sweep_id: bench_scale_modal_v1
model_name: gpt2-xl
max_new_tokens: [32, 64]
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 2
verify_match: false
mt_bench_path: /repo/data/mt_bench_scale_prompts.json
max_prompts: null
short_token_max: 256
medium_token_max: 640
context_buckets:
  - short
  - medium
  - long
strict_labeled_grid: true
modes:
  - autoregressive
  - speculative_fp16
  - sparse_quant
  - quant_only
  - sparse_only
k_values: [1, 3, 5, 7]
sparsity_budgets: [0.1, 0.4, 1.0]
quant_bits: [4, 8, 16]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: /results/sweep_scale_modal_v1.csv
raw_jsonl_path: /results/raw/bench_scale_modal_v1.jsonl
processed_json: /results/processed/bench_scale_modal_v1_rollup.json
summary_csv: /results/sweep_scale_modal_v1_summary.csv
config_bundle_json: /results/bench_scale_modal_v1_config.json
resume: true
retry_failures: false
