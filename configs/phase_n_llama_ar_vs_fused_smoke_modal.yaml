# Phase N — minimal Modal run: hf_ar vs hierarchical_fused (Triton verifier kernel)
#
# Grid: ar (1) + quant_spec × γ=4 × G=32 × qgs=null × kv=triton (1) => 2 measured rows
# per context × prompt. Tuned for ~few minutes on A10G including one model load.
#
# Run:
#   modal run modal_phase_n.py --sweep configs/phase_n_llama_ar_vs_fused_smoke_modal.yaml --gpu A10G

sweep_id: phase_n_llama_ar_vs_fused_smoke_v7
model_name: openlm-research/open_llama_7b_v2
device: cuda
dtype: float16
seed: 42
warmup_trials: 0
num_trials: 1
row_retries: 1
verify_match: false

max_new_tokens: 32
min_prompt_tokens: 384
context_length_tokens_values: [512]

short_token_max: 512
medium_token_max: 1536
batch_size: 1

mt_bench_path: data/mt_bench_subset.json
max_prompts: 1

baselines:
  - ar
  - quant_spec

gamma_values: [4]
G_values: [32]
quant_group_size_values:
  - null
kv_kernel_backend_values:
  - triton

validate_triton_kernels_at_start: true
cuda_graphs_enabled: false
timing_sync: cuda_synchronize_end
apply_quant_spec_attention_patch: null

kernel_tuning_profile: a10g_balanced

output_csv: /results/phase_n/phase_n_llama_ar_vs_fused_smoke_v7.csv
raw_jsonl: /results/phase_n/phase_n_llama_ar_vs_fused_smoke_v7.jsonl
resume: false

speedup_definition_note: |
  Compare comparison_mode hf_ar vs hierarchical_fused using tokens_per_sec_decode_phase.

notes: |
  Smoke for Modal: OpenLlama 7B v2, short decode, single prompt, Triton hierarchical only.
