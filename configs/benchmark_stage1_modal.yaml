# Stage 1 Modal: same matrix as stage1 local; outputs on `/results` Volume.
sweep_id: bench_stage1_modal_v1
model_name: gpt2
max_new_tokens: 16
device: cuda
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 2
verify_match: false
mt_bench_path: /repo/data/mt_bench_subset.json
max_prompts: 8
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
strict_labeled_grid: true
modes:
  - ar
  - spec_fp16
  - spec_quant_memonly
  - spec_sparse
  - spec_sparse_quant_memonly
k_values: [1, 3]
sparsity_budgets: [0.2, 0.4]
quant_bits: [4, 8]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: /results/sweep_stage1_modal.csv
raw_jsonl_path: /results/raw/bench_stage1_modal_v1.jsonl
processed_json: /results/processed/bench_stage1_modal_v1_rollup.json
summary_csv: /results/sweep_stage1_modal_summary.csv
config_bundle_json: /results/bench_stage1_modal_v1_config.json
resume: true
retry_failures: false
