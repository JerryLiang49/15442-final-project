# Phase N — **primary** Modal performance sweep (alias intent: same as ``phase_n_sweep_modal.yaml``)
#
# **Ungated** 7B Llama-class model for reproducible Modal runs.

sweep_id: phase_n_primary_modal_v1
model_name: openlm-research/open_llama_7b_v2
device: cuda
dtype: float16
seed: 42
warmup_trials: 1
num_trials: 2
row_retries: 1
verify_match: false

max_new_tokens: 128
min_prompt_tokens: 512
context_length_tokens_values:
  - 1024
  - 2048

short_token_max: 512
medium_token_max: 1536
batch_size: 1

mt_bench_path: data/mt_bench_subset.json
max_prompts: 3

baselines:
  - ar
  - dense_spec
  - quant_spec

gamma_values: [4, 8]
G_values: [32, 64]
quant_group_size_values:
  - null
  - 32

kv_kernel_backend_values:
  - reference
  - triton

validate_triton_kernels_at_start: true
apply_quant_spec_attention_patch: null

kernel_tuning_profile: a10g_balanced

output_csv: /results/phase_n/phase_n_primary_modal_v1.csv
raw_jsonl: /results/phase_n/phase_n_primary_modal_v1.jsonl
resume: true

speedup_definition_note: |
  Primary Phase N: compare hf_ar vs dense_self_spec vs hierarchical_ref/fused; decode tok/s excludes prefill.

notes: |
  OpenLlama 7B v2; max context 2048. For Meta Llama-2-7B see phase_n_sweep_modal_llama2_meta_gated.yaml.
