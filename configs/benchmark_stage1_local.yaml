# Stage 1: narrow stable sweep (all five benchmark labels) before scaling up.
sweep_id: bench_stage1_local_v1
model_name: gpt2
max_new_tokens: 16
device: auto
dtype: float16
seed: 42
warmup_runs: 1
num_trials: 2
verify_match: false
mt_bench_path: data/mt_bench_subset.json
max_prompts: 8
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
  - medium
strict_labeled_grid: true
modes:
  - ar
  - spec_fp16
  - spec_quant_memonly
  - spec_sparse
  - spec_sparse_quant_memonly
k_values: [1, 3]
sparsity_budgets: [0.2, 0.4]
quant_bits: [4, 8]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: outputs/benchmarks/sweep_stage1_local.csv
raw_jsonl_path: outputs/benchmarks/raw/bench_stage1_local_v1.jsonl
processed_json: outputs/benchmarks/processed/bench_stage1_local_v1_rollup.json
summary_csv: outputs/benchmarks/sweep_stage1_local_summary.csv
config_bundle_json: outputs/benchmarks/bench_stage1_local_v1_config.json
resume: true
retry_failures: false
