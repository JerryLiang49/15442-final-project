# Tiny Modal Volume sweep (autoregressive-only; active stack).
# Legacy grid: old_impl/configs/benchmark_presweep_modal.yaml
sweep_id: bench_presweep_modal_v2
model_name: gpt2
max_new_tokens: 6
device: cuda
dtype: float16
seed: 42
warmup_runs: 0
num_trials: 1
verify_match: false
mt_bench_path: /repo/data/mt_bench_subset.json
max_prompts: 2
short_token_max: 64
medium_token_max: 256
context_buckets:
  - short
strict_labeled_grid: true
modes:
  - ar
k_values: [1]
sparsity_budgets: [0.4]
quant_bits: [4]
recent_window_fraction: 0.15
sparse_refresh_interval: 2
sparse_scoring: key_norm
output_csv: /results/presweep_modal.csv
raw_jsonl_path: /results/raw/bench_presweep_modal_v2.jsonl
processed_json: /results/processed/bench_presweep_modal_v2_rollup.json
summary_csv: /results/presweep_modal_summary.csv
config_bundle_json: /results/bench_presweep_modal_v2_config.json
resume: false
retry_failures: false
